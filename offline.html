<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigNow דוגמה | אופליין</title>
  <meta name="theme-color" content="#1A1A1A">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(197, 160, 89, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #fff; }
    p { color: #9ca3af; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      background: #C5A059;
      color: #fff;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #A38040; }
    .phone { margin-top: 1.5rem; }
    .phone a { color: #C5A059; text-decoration: none; font-size: 1.1rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✂️</div>
    <h1>אין חיבור לאינטרנט</h1>
    <p>נראה שאין חיבור כרגע. בדוק את החיבור לרשת ונסה שוב.</p>
    <button class="btn" onclick="location.reload()">נסה שוב</button>
    <div class="phone">
      <p>בינתיים, אפשר להתקשר:</p>
      <a href="tel:0501234567" dir="ltr">📞 050-123-4567</a>
    </div>
  </div>
</body>
</html>
